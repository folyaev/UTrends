services:
  trends-bot:
    build: .
    container_name: trends-bot
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-m", "utrends.healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    env_file:
      - .env

    volumes:
      - ./trends.db:/app/trends.db
      - ./feeds.json:/app/feeds.json
      - ./backups:/app/backups
