name: checks

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python files
        run: python -m py_compile bot.py config.py rss_parser.py searxng_client.py telegram_html.py trends_parser.py wiki_trends.py url_utils.py
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
